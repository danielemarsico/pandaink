name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build portable EXE
        run: python -m PyInstaller build/PandaInk.spec --distpath dist --workpath build/work

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          $version = if ($ref -match '^v(.+)$') { $Matches[1] } elseif ($ref -eq 'master') { 'dev' } else { $ref }
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = (Get-ChildItem "C:\Program Files*\Inno Setup*\ISCC.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          Write-Host "Using ISCC: $iscc  version: $version"
          & $iscc /DMyAppVersion=$version build\PandaInk.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PandaInk-portable
          path: dist/PandaInk.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: PandaInk-installer
          path: dist/PandaInk-setup.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PandaInk.exe
            dist/PandaInk-setup.exe
          name: PandaInk ${{ github.ref_name }}
          generate_release_notes: true
